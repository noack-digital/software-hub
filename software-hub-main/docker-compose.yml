version: "3.9"

services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-software_hub}
      MYSQL_USER: ${DB_USER:-software_hub}
      MYSQL_PASSWORD: ${DB_PASS:-SoftwareHub2024}
    volumes:
      - db_data:/var/lib/mysql

  app:
    build:
      context: ./software-hub-php
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-software_hub}
      DB_USER: ${DB_USER:-software_hub}
      DB_PASS: ${DB_PASS:-SoftwareHub2024}
      APP_URL: http://localhost:8080
    ports:
      - "8080:80"
    volumes:
      - ./software-hub-php/uploads:/var/www/html/uploads

volumes:
  db_data:
