<VirtualHost *:80>
    ServerName sh.lokal
    ServerAlias www.sh.lokal

    DocumentRoot /home/anoack/claude-code-projekte/Software-Hub/software-hub-php

    <Directory /home/anoack/claude-code-projekte/Software-Hub/software-hub-php>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # PHP-Konfiguration
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.4-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/sh-lokal-error.log
    CustomLog ${APACHE_LOG_DIR}/sh-lokal-access.log combined

    # Security Headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
</VirtualHost>
